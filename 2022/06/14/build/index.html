        <h3 id="安装hexo"><a href="#安装hexo" class="headerlink" title="安装hexo"></a>安装hexo</h3><figure class="highlight plaintext"><figcaption><span>hexo安装</span><a target="_blank" rel="noopener" href="https://hexo.io/zh-cn/docs/">hexo安装</a></figcaption><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br></pre></td><td class="code"><pre><span class="line">npm install -g hexo-cli</span><br><span class="line">echo &#x27;PATH=&quot;$PATH:./node_modules/.bin&quot;&#x27; &gt;&gt; ~/.profile</span><br></pre></td></tr></table></figure>

<h3 id="创建项目"><a href="#创建项目" class="headerlink" title="创建项目"></a>创建项目</h3><figure class="highlight plaintext"><figcaption><span>创建项目</span><a target="_blank" rel="noopener" href="https://hexo.io/zh-cn/docs/setup">创建项目</a></figcaption><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br></pre></td><td class="code"><pre><span class="line">blog为项目名称</span><br><span class="line"></span><br><span class="line">hexo init blog </span><br><span class="line">cd blog</span><br><span class="line">npm install</span><br></pre></td></tr></table></figure>


<h3 id="配置"><a href="#配置" class="headerlink" title="配置"></a>配置</h3><figure class="highlight plaintext"><figcaption><span>配置</span><a target="_blank" rel="noopener" href="https://hexo.io/zh-cn/docs/">配置</a></figcaption><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br></pre></td><td class="code"><pre><span class="line">修改_config.yml的title,url,root,new_post_name</span><br><span class="line"></span><br><span class="line">title: 标题</span><br><span class="line">url: github page的地址</span><br><span class="line">root: github page的项目名称 和 url一样的时候填写/</span><br><span class="line">new_post_name: 生成新文章的自动名称</span><br></pre></td></tr></table></figure>

<h3 id="生成新文章"><a href="#生成新文章" class="headerlink" title="生成新文章"></a>生成新文章</h3><figure class="highlight plaintext"><figcaption><span>生成新文章</span><a target="_blank" rel="noopener" href="https://hexo.io/zh-cn/docs/commands">生成新文章</a></figcaption><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br></pre></td><td class="code"><pre><span class="line">生成名称为title的新文章</span><br><span class="line">hexo new post title</span><br><span class="line"></span><br><span class="line">生成名称为title的新草稿</span><br><span class="line">hexo new draft title</span><br><span class="line"></span><br><span class="line">发表草稿(把草稿转移到post中)</span><br><span class="line">hexo publish post title</span><br></pre></td></tr></table></figure>

<h3 id="一键部署"><a href="#一键部署" class="headerlink" title="一键部署"></a>一键部署</h3><figure class="highlight plaintext"><figcaption><span>一键部署</span><a target="_blank" rel="noopener" href="https://hexo.io/zh-cn/docs/one-command-deployment">一键部署</a></figcaption><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br></pre></td><td class="code"><pre><span class="line">安装 hexo-deployer-git</span><br><span class="line">npm install hexo-deployer-git --save</span><br><span class="line"></span><br><span class="line">修改_config.yml的配置</span><br><span class="line">deploy:</span><br><span class="line">type: &#x27;git&#x27; //使用git发布</span><br><span class="line">repo: &#x27;git@github.com:TskFok/tskfok.github.io.git&#x27; //要发布的github repo的地址,一般是新建一个repo</span><br><span class="line">branch: &#x27;master&#x27; //要发布的分支</span><br><span class="line">message: &#x27;发布新日记&#x27; //git发布时的message</span><br><span class="line"></span><br><span class="line"></span><br><span class="line">生成站点文件并推送至远程库,过一会就能看到新发布的内容</span><br><span class="line">hexo clean &amp;&amp; hexo deploy</span><br></pre></td></tr></table></figure>
